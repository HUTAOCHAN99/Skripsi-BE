version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: skripsi-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Skripsi2026!
      POSTGRES_DB: skripsi_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: skripsi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: skripsi-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:Skripsi2026!@postgres:5432/skripsi_db?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: skripsi-super-secret-key-2026
      PORT: 5000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data:
  redis_data: